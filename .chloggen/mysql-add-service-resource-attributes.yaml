change_type: enhancement

component: receiver/mysql

note: Add `service.instance.id` resource attribute to MySQL receiver metrics and log events.

issues: [47174]

subtext: |
  The `service.instance.id` attribute is set on all emitted metrics and log events (query samples and top queries).
  Its value is a UUID v5 derived deterministically from the configured `mysql.instance.endpoint` using the
  OpenTelemetry-specified namespace (`4d63009a-8d0f-11ee-aad7-4c796ed8e320`), as defined by the OTel
  semantic conventions for `service.instance.id`. This produces a stable, unique identifier for each
  MySQL instance without requiring manual configuration.

